<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You - Sahil Gaikwad</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .thanks-layout {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #e8f0fe, #f5f7f8);
            padding: 24px;
        }
        .thanks-card {
            max-width: 500px;
            text-align: center;
            padding: 48px 32px;
        }
        .success-icon {
            font-size: 64px;
            color: #34a853; /* Google Green */
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="thanks-layout">
        <div class="md-card thanks-card">
            <div class="success-icon">✓</div>
            <h1 class="hero-subtitle" style="color: var(--md-sys-color-primary); margin-bottom: 16px;">Thanks for the email!</h1>
            <p style="font-size: 18px; color: var(--md-sys-color-on-surface-variant); margin-bottom: 32px;">Sahil will contact you shortly.</p>
            <a href="index.html" class="md-btn md-btn-primary">Return to Portfolio</a>
        </div>
    </div>
</body>
</html>
